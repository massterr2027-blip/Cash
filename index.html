<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Кошелек — Калькулятор расходов</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #eef2f8;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    .app-container {
      max-width: 500px;
      width: 100%;
      margin: 0 auto;
      background: white;
      border-radius: 36px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      overflow: hidden;
      padding: 20px 18px 30px;
    }

    /* Карта */
    .card-section {
      background: linear-gradient(145deg, #1a1a2e 0%, #0f0f23 100%);
      border-radius: 28px;
      padding: 22px 20px;
      margin-bottom: 24px;
      color: white;
      box-shadow: 0 15px 30px rgba(0,0,0,0.3);
      position: relative;
      overflow: hidden;
    }
    .card-section::before {
      content: '';
      position: absolute;
      top: -30%;
      right: -20%;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
      border-radius: 50%;
    }
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }
    .bank-name {
      font-family: 'Georgia', serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #e8c25d;
    }
    .card-actions {
      display: flex;
      gap: 12px;
    }
    .icon-btn {
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.15);
      border-radius: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
      backdrop-filter: blur(4px);
    }
    .icon-btn:active {
      transform: scale(0.95);
      background: rgba(255,255,255,0.25);
    }
    .icon-btn svg {
      width: 22px;
      height: 22px;
      stroke: white;
      stroke-width: 1.8;
      fill: none;
    }
    .balance-area {
      margin-bottom: 28px;
    }
    .balance-label {
      font-size: 12px;
      font-weight: 500;
      opacity: 0.6;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .balance-amount {
      font-size: 44px;
      font-weight: 800;
      letter-spacing: -1px;
    }
    .card-stats {
      display: flex;
      gap: 24px;
      margin-bottom: 28px;
    }
    .card-stat {
      flex: 1;
    }
    .card-stat-label {
      font-size: 10px;
      font-weight: 600;
      opacity: 0.5;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .card-stat-value {
      font-size: 18px;
      font-weight: 700;
    }
    .card-stat-value.income { color: #4ade80; }
    .card-stat-value.expense { color: #f87171; }
    .card-button {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 12px;
      border-radius: 60px;
      text-align: center;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: 0.1s;
      margin-bottom: 12px;
    }
    .card-button:active {
      transform: scale(0.98);
      background: rgba(255,255,255,0.2);
    }
    .card-bottom {
      display: flex;
      justify-content: flex-end;
      align-items: flex-end;
    }
    .card-expiry {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      text-align: right;
    }
    .card-expiry span {
      display: block;
      font-size: 8px;
      opacity: 0.5;
      margin-bottom: 2px;
    }

    /* Фильтры внутри истории */
    .filter-bar {
      display: flex;
      gap: 10px;
      margin: 16px 0;
      flex-wrap: wrap;
    }
    .filter-btn {
      flex: 1;
      background: #f1f5f9;
      border: none;
      padding: 12px 0;
      border-radius: 60px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
    }
    .filter-btn.active-filter {
      background: #4f46e5;
      color: white;
    }

    .transactions-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 450px;
      overflow-y: auto;
    }
    .transactions-list::-webkit-scrollbar {
      width: 5px;
    }
    .transactions-list::-webkit-scrollbar-track {
      background: #e2e8f0;
      border-radius: 10px;
    }
    .transactions-list::-webkit-scrollbar-thumb {
      background: #94a3b8;
      border-radius: 10px;
    }
    .day-group { margin-top: 8px; }
    .day-label {
      font-size: 14px;
      font-weight: 800;
      color: #475569;
      padding: 8px 0;
    }
    .transaction-item {
      background: white;
      border-radius: 24px;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid #e2e8f0;
    }
    .tx-left { flex: 1; }
    .tx-category {
      font-weight: 800;
      font-size: 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }
    .tx-badge {
      border-radius: 40px;
      padding: 2px 10px;
      font-size: 11px;
      font-weight: 700;
    }
    .tx-badge.income-badge { background: #22c55e; color: white; }
    .tx-badge.expense-badge { background: #ef4444; color: white; }
    .tx-comment { font-size: 12px; color: #64748b; margin-top: 4px; }
    .tx-amount {
      font-size: 18px;
      font-weight: 800;
      margin-right: 12px;
      min-width: 90px;
      text-align: right;
    }
    .income-amount { color: #16a34a; }
    .expense-amount { color: #dc2626; }
    .delete-btn {
      background: #f1f5f9;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 44px;
      cursor: pointer;
      font-size: 20px;
      color: #94a3b8;
    }

    /* Модальное окно операции */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: 0.2s;
    }
    .modal-overlay.active {
      visibility: visible;
      opacity: 1;
    }
    .add-form-modal {
      background: white;
      border-radius: 44px;
      padding: 28px 24px;
      width: 90%;
      max-width: 400px;
    }
    .add-form-modal.income-bg {
      background: linear-gradient(145deg, #f0fdf4 0%, #dcfce7 100%);
      border: 2px solid #22c55e;
    }
    .add-form-modal.expense-bg {
      background: linear-gradient(145deg, #fef2f2 0%, #fee2e2 100%);
      border: 2px solid #ef4444;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .modal-header h3 {
      font-size: 22px;
      font-weight: 800;
      color: #1e293b;
    }
    .close-modal-btn {
      background: rgba(0,0,0,0.05);
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 44px;
      font-size: 24px;
      cursor: pointer;
    }
    .form-row {
      margin-bottom: 16px;
    }
    input {
      width: 100%;
      padding: 16px 18px;
      font-size: 16px;
      font-weight: 500;
      border: 1.5px solid #e2e8f0;
      border-radius: 60px;
      background: white;
    }
    input:focus {
      outline: none;
      border-color: #4f46e5;
    }
    .type-toggle {
      display: flex;
      gap: 12px;
    }
    .type-btn {
      flex: 1;
      text-align: center;
      padding: 14px 0;
      border-radius: 60px;
      font-weight: 700;
      font-size: 16px;
      background: #f1f5f9;
      color: #475569;
      cursor: pointer;
    }
    .type-btn.active-income {
      background: #22c55e;
      color: white;
    }
    .type-btn.active-expense {
      background: #ef4444;
      color: white;
    }
    .select-category-btn {
      width: 100%;
      padding: 16px 18px;
      font-size: 16px;
      font-weight: 600;
      background: white;
      border: 1.5px solid #e2e8f0;
      border-radius: 60px;
      cursor: pointer;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .submit-btn {
      background: #4f46e5;
      color: white;
      border: none;
      font-weight: 800;
      font-size: 17px;
      padding: 16px;
      border-radius: 60px;
      width: 100%;
      cursor: pointer;
      margin-top: 8px;
    }

    /* Модалки выбора */
    .category-select-modal, .calendar-select-modal, .history-modal, .settings-data-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1100;
      visibility: hidden;
      opacity: 0;
      transition: 0.2s;
    }
    .category-select-modal.active, .calendar-select-modal.active, .history-modal.active, .settings-data-modal.active {
      visibility: visible;
      opacity: 1;
    }
    .category-select-content, .calendar-select-content, .history-content, .settings-data-content {
      background: white;
      border-radius: 44px;
      padding: 28px 24px;
      width: 90%;
      max-width: 420px;
      text-align: center;
    }
    .history-content {
      max-height: 80vh;
      overflow-y: auto;
    }
    .category-list {
      max-height: 350px;
      overflow-y: auto;
      margin: 20px 0;
    }
    .category-option {
      padding: 16px;
      margin: 6px 0;
      background: #f8fafc;
      border-radius: 60px;
      cursor: pointer;
      font-weight: 600;
    }
    .category-option.selected {
      background: #4f46e5;
      color: white;
    }
    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .calendar-header button {
      background: #f1f5f9;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 44px;
      font-size: 20px;
      cursor: pointer;
    }
    .calendar-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .calendar-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }
    .cal-day {
      padding: 12px 0;
      text-align: center;
      border-radius: 40px;
      cursor: pointer;
      background: #f8fafc;
      font-weight: 600;
    }
    .cal-day.selected {
      background: #4f46e5;
      color: white;
    }
    .close-cat-btn, .close-cal-btn, .close-history-btn, .close-settings-btn {
      background: #f1f5f9;
      border: none;
      padding: 14px;
      border-radius: 60px;
      width: 100%;
      font-weight: 700;
      cursor: pointer;
      margin-top: 16px;
    }

    /* Модалка управления категориями — круглые кнопки */
    .cat-modal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1200;
      visibility: hidden;
      opacity: 0;
    }
    .cat-modal.active {
      visibility: visible;
      opacity: 1;
    }
    .cat-content {
      background: white;
      width: 90%;
      max-width: 360px;
      border-radius: 48px;
      padding: 28px 24px;
      text-align: center;
    }
    .cat-list {
      max-height: 300px;
      overflow-y: auto;
      margin: 20px 0;
    }
    .cat-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      margin-bottom: 10px;
      background: #f8fafc;
      border-radius: 60px;
    }
    .cat-name {
      font-size: 16px;
      font-weight: 600;
      color: #1e293b;
    }
    .cat-actions {
      display: flex;
      gap: 10px;
    }
    .cat-actions button {
      width: 48px;
      height: 48px;
      border-radius: 48px;
      border: none;
      font-size: 22px;
      cursor: pointer;
      transition: 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cat-actions button:active {
      transform: scale(0.94);
    }
    .edit-cat {
      background: #eef2ff;
      color: #4f46e5;
    }
    .del-cat {
      background: #fef2f2;
      color: #ef4444;
    }
    .add-cat-field {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    .add-cat-field input {
      flex: 1;
      padding: 14px 18px;
      border-radius: 60px;
      border: 1.5px solid #e2e8f0;
      font-size: 16px;
    }
    .add-cat-field button {
      width: 56px;
      height: 56px;
      border-radius: 56px;
      background: #4f46e5;
      color: white;
      border: none;
      font-size: 32px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .add-cat-field button:active {
      transform: scale(0.94);
    }
    .close-cat-btn {
      background: #f1f5f9;
      border: none;
      padding: 14px;
      border-radius: 60px;
      width: 100%;
      font-weight: 700;
      cursor: pointer;
    }

    /* Alert, Confirm, Prompt */
    .alert-modal, .confirm-modal, .prompt-modal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1300;
      visibility: hidden;
      opacity: 0;
    }
    .alert-modal.active, .confirm-modal.active, .prompt-modal.active {
      visibility: visible;
      opacity: 1;
    }
    .alert-content, .confirm-content, .prompt-content {
      background: white;
      width: 90%;
      max-width: 340px;
      border-radius: 48px;
      padding: 32px 24px;
      text-align: center;
    }
    .confirm-buttons { display: flex; gap: 12px; margin-top: 8px; }
    .confirm-cancel { background: #f1f5f9; flex: 1; padding: 14px; border-radius: 60px; border: none; font-weight: 700; cursor: pointer; }
    .confirm-ok { background: #ef4444; color: white; flex: 1; padding: 14px; border-radius: 60px; border: none; font-weight: 700; cursor: pointer; }
    .prompt-content input {
      width: 100%;
      padding: 14px;
      border-radius: 60px;
      margin-bottom: 20px;
      border: 1.5px solid #e2e8f0;
    }
    .prompt-buttons { display: flex; gap: 12px; }
    .prompt-cancel, .prompt-ok { flex: 1; padding: 14px; border-radius: 60px; border: none; font-weight: 700; cursor: pointer; }
    .prompt-ok { background: #4f46e5; color: white; }
    .prompt-cancel { background: #f1f5f9; }

    .settings-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 16px;
    }
    .settings-btn, .import-label {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      padding: 14px 10px;
      border-radius: 60px;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
      flex: 1;
      cursor: pointer;
    }
    .file-input-hidden { display: none; }
    .empty-history { text-align: center; padding: 40px; color: #94a3b8; background: #f8fafc; border-radius: 28px; }
  </style>
</head>
<body>
<div class="app-container">
  <!-- Карта -->
  <div class="card-section">
    <div class="card-top">
      <div class="bank-name">TICKETSUSA</div>
      <div class="card-actions">
        <div class="icon-btn" id="openHistoryBtn">
          <svg viewBox="0 0 24 24" stroke="currentColor">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </div>
        <div class="icon-btn" id="openSettingsBtn">
          <svg viewBox="0 0 24 24" stroke="currentColor">
            <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" />
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1Z" />
          </svg>
        </div>
      </div>
    </div>
    <div class="balance-area">
      <div class="balance-label">ТЕКУЩИЙ БАЛАНС</div>
      <div class="balance-amount" id="balanceTotal">0 ₴</div>
    </div>
    <div class="card-stats">
      <div class="card-stat">
        <div class="card-stat-label">ДОХОДЫ (МЕС)</div>
        <div class="card-stat-value income" id="monthIncome">0 ₴</div>
      </div>
      <div class="card-stat">
        <div class="card-stat-label">РАСХОДЫ (МЕС)</div>
        <div class="card-stat-value expense" id="monthExpense">0 ₴</div>
      </div>
    </div>
    <div class="card-button" id="openNewOperationBtn">Новая операция</div>
    <div class="card-bottom">
      <div class="card-expiry">
        <span>VALID THRU</span>
        <span id="cardExpiry">12/35</span>
      </div>
    </div>
  </div>
</div>

<!-- Модалка истории -->
<div id="historyModal" class="history-modal">
  <div class="history-content">
    <div class="modal-header">
      <h3>📋 История</h3>
      <button class="close-modal-btn" id="closeHistoryBtn">✕</button>
    </div>
    <div class="filter-bar">
      <button class="filter-btn" data-filter="today">Сегодня</button>
      <button class="filter-btn" data-filter="week">За неделю</button>
      <button class="filter-btn" data-filter="month">За месяц</button>
      <button class="filter-btn active-filter" data-filter="all">За всё время</button>
    </div>
    <button class="clear-btn" id="softClearBtn" style="background:#fee2e2; margin-bottom:16px;">🗑 Очистить всё</button>
    <div id="historyList" class="transactions-list"></div>
    <button class="close-history-btn" id="closeHistoryModalBtn">Закрыть</button>
  </div>
</div>

<!-- Модалка управления данными -->
<div id="settingsDataModal" class="settings-data-modal">
  <div class="settings-data-content">
    <div class="modal-header">
      <h3>⚙️ Управление данными</h3>
      <button class="close-modal-btn" id="closeSettingsBtn">✕</button>
    </div>
    <div class="settings-panel" style="flex-direction:column;">
      <button class="settings-btn" id="exportExcelBtn">📎 Excel (XLSX)</button>
      <button class="settings-btn" id="exportBackupBtn">💾 Бэкап JSON</button>
      <label class="import-label">📂 Восстановить<input type="file" id="importFileInput" accept=".json" class="file-input-hidden"></label>
      <button class="settings-btn" id="editCategoriesFromSettingsBtn">✏️ Редактировать категории</button>
    </div>
    <button class="close-settings-btn" id="closeSettingsModalBtn">Закрыть</button>
  </div>
</div>

<!-- Модалка операции -->
<div id="operationModal" class="modal-overlay">
  <div class="add-form-modal" id="operationForm">
    <div class="modal-header">
      <h3>Новая операция</h3>
      <button class="close-modal-btn" id="closeModalBtn">✕</button>
    </div>
    <div class="form-row">
      <input type="number" id="amountInput" placeholder="Сумма" inputmode="decimal" step="any">
    </div>
    <div class="form-row">
      <div class="type-toggle" id="typeToggle">
        <div class="type-btn active-income" data-type="income">Доход</div>
        <div class="type-btn" data-type="expense">Расход</div>
      </div>
    </div>
    <div class="form-row">
      <button class="select-category-btn" id="openCategorySelectBtn">
        <span id="selectedCategoryDisplay">Продукты</span>
        <span>▼</span>
      </button>
    </div>
    <div class="form-row">
      <input type="text" id="commentInput" placeholder="Комментарий">
    </div>
    <div class="form-row">
      <button class="select-category-btn" id="openDateSelectBtn">
        <span id="selectedDateDisplay">2026-06-14</span>
        <span>📅</span>
      </button>
    </div>
    <button class="submit-btn" id="addTransactionBtn">Добавить операцию</button>
  </div>
</div>

<!-- Модалка выбора категории -->
<div id="categorySelectModal" class="category-select-modal">
  <div class="category-select-content">
    <h3>Выберите категорию</h3>
    <div id="categorySelectList" class="category-list"></div>
    <button class="close-cat-btn" id="closeCategorySelectBtn">Закрыть</button>
  </div>
</div>

<!-- Модалка выбора даты -->
<div id="dateSelectModal" class="calendar-select-modal">
  <div class="calendar-select-content">
    <div id="calendarModalContent"></div>
    <button class="close-cal-btn" id="closeDateSelectBtn">Закрыть</button>
  </div>
</div>

<!-- Модалка категорий -->
<div id="categoryModal" class="cat-modal">
  <div class="cat-content">
    <h4>Редактирование категорий</h4>
    <div id="categoryListContainer" class="cat-list"></div>
    <div class="add-cat-field">
      <input type="text" id="newCategoryName" placeholder="Новая категория">
      <button id="addCategoryBtn">+</button>
    </div>
    <button class="close-cat-btn" id="closeCatModalBtn">Закрыть</button>
  </div>
</div>

<!-- Alert, Confirm, Prompt -->
<div id="alertModal" class="alert-modal"><div class="alert-content"><h4 id="alertTitle">Уведомление</h4><p id="alertMessage"></p><button class="confirm-cancel" id="alertCloseBtn" style="background:#4f46e5;color:white;">OK</button></div></div>
<div id="confirmModal" class="confirm-modal"><div class="confirm-content"><h4>Подтверждение</h4><p id="confirmMessage"></p><div class="confirm-buttons"><button class="confirm-cancel" id="confirmNoBtn">Отмена</button><button class="confirm-ok" id="confirmYesBtn">Удалить</button></div></div></div>
<div id="promptModal" class="prompt-modal"><div class="prompt-content"><h3>Редактирование</h3><p>Введите новое название</p><input type="text" id="promptInput"><div class="prompt-buttons"><button class="prompt-cancel" id="promptCancelBtn">Отмена</button><button class="prompt-ok" id="promptOkBtn">Сохранить</button></div></div></div>

<script>
  let transactions = [];
  let categories = ['Продукты', 'Транспорт', 'Бизнес', 'Жилье', 'Другое'];
  let currentFilter = 'all';
  let selectedDate = new Date().toISOString().slice(0,10);
  let selectedCategory = 'Продукты';
  let currentCalendarYear = new Date().getFullYear();
  let currentCalendarMonth = new Date().getMonth();

  function showAlert(msg, title = 'Уведомление') {
    const modal = document.getElementById('alertModal');
    document.getElementById('alertTitle').innerText = title;
    document.getElementById('alertMessage').innerText = msg;
    modal.classList.add('active');
    document.getElementById('alertCloseBtn').onclick = () => modal.classList.remove('active');
  }

  function showConfirm(msg, onYes) {
    const modal = document.getElementById('confirmModal');
    document.getElementById('confirmMessage').innerText = msg;
    modal.classList.add('active');
    const yesBtn = document.getElementById('confirmYesBtn');
    const noBtn = document.getElementById('confirmNoBtn');
    const cleanup = () => { yesBtn.removeEventListener('click', onYesClick); noBtn.removeEventListener('click', onNoClick); };
    const onYesClick = () => { modal.classList.remove('active'); cleanup(); if (onYes) onYes(); };
    const onNoClick = () => { modal.classList.remove('active'); cleanup(); };
    yesBtn.addEventListener('click', onYesClick);
    noBtn.addEventListener('click', onNoClick);
  }

  function showPrompt(currentVal, callback) {
    const modal = document.getElementById('promptModal');
    const input = document.getElementById('promptInput');
    input.value = currentVal;
    modal.classList.add('active');
    input.focus();
    const okBtn = document.getElementById('promptOkBtn');
    const cancelBtn = document.getElementById('promptCancelBtn');
    const onOk = () => { const newVal = input.value.trim(); modal.classList.remove('active'); cleanup(); if (newVal && newVal !== currentVal) callback(newVal); };
    const onCancel = () => { modal.classList.remove('active'); cleanup(); };
    const cleanup = () => { okBtn.removeEventListener('click', onOk); cancelBtn.removeEventListener('click', onCancel); };
    okBtn.addEventListener('click', onOk);
    cancelBtn.addEventListener('click', onCancel);
  }

  function saveToLocal() { localStorage.setItem('expenses_app', JSON.stringify({ transactions, categories })); }
  function loadFromLocal() {
    const raw = localStorage.getItem('expenses_app');
    if (raw) { try { const data = JSON.parse(raw); if (data.transactions) transactions = data.transactions; if (data.categories) categories = data.categories; } catch(e) {} }
    if (!categories.length) categories = ['Продукты', 'Транспорт', 'Бизнес', 'Жилье', 'Другое'];
  }

  function filterByPeriod(period) {
    const now = new Date(), today = new Date().toISOString().slice(0,10);
    if (period === 'today') return transactions.filter(t => t.date === today);
    if (period === 'week') { const weekAgo = new Date(); weekAgo.setDate(now.getDate() - 7); return transactions.filter(t => new Date(t.date) >= weekAgo); }
    if (period === 'month') { const monthAgo = new Date(); monthAgo.setMonth(now.getMonth() - 1); return transactions.filter(t => new Date(t.date) >= monthAgo); }
    return [...transactions];
  }

  function computeStats() {
    let balance = 0, monthIncome = 0, monthExpense = 0;
    const now = new Date(), curYear = now.getFullYear(), curMonth = now.getMonth();
    for (let tx of transactions) {
      if (tx.type === 'income') balance += tx.amount; else balance -= tx.amount;
      const d = new Date(tx.date);
      if (d.getFullYear() === curYear && d.getMonth() === curMonth) {
        if (tx.type === 'income') monthIncome += tx.amount; else monthExpense += tx.amount;
      }
    }
    return { balance, monthIncome, monthExpense };
  }

  function formatUAH(num) { return Number(num).toLocaleString('ru-UA', { min: 0, max: 2 }) + ' ₴'; }
  function updateStats() {
    const { balance, monthIncome, monthExpense } = computeStats();
    document.getElementById('balanceTotal').innerText = formatUAH(balance);
    document.getElementById('monthIncome').innerText = formatUAH(monthIncome);
    document.getElementById('monthExpense').innerText = formatUAH(monthExpense);
  }
  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
  function formatDateLabel(d) {
    const today = new Date().toISOString().slice(0,10);
    const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
    if (d === today) return 'Сегодня';
    if (d === yesterday) return 'Вчера';
    return new Date(d).toLocaleDateString('ru-RU', { day:'numeric', month:'long' });
  }

  function deleteTransaction(id) {
    transactions = transactions.filter(t => t.id.toString() !== id.toString());
    saveToLocal(); updateStats(); renderHistory();
    showAlert('Запись удалена');
  }

  function renderHistory() {
    const filtered = filterByPeriod(currentFilter);
    const container = document.getElementById('historyList');
    if (!filtered.length) { container.innerHTML = '<div class="empty-history">Нет операций</div>'; return; }
    const sorted = [...filtered].sort((a,b) => new Date(b.date) - new Date(a.date));
    const groups = {};
    for (let tx of sorted) { if (!groups[tx.date]) groups[tx.date] = []; groups[tx.date].push(tx); }
    let html = '';
    for (let [date, txs] of Object.entries(groups)) {
      html += `<div class="day-group"><div class="day-label">📅 ${formatDateLabel(date)}</div>`;
      for (let tx of txs) {
        const sign = tx.type === 'income' ? '+' : '−';
        const amountClass = tx.type === 'income' ? 'income-amount' : 'expense-amount';
        const badgeClass = tx.type === 'income' ? 'income-badge' : 'expense-badge';
        const badgeText = tx.type === 'income' ? 'Доход' : 'Расход';
        html += `<div class="transaction-item">
          <div class="tx-left"><div class="tx-category"><span>${escapeHtml(tx.category)}</span><span class="tx-badge ${badgeClass}">${badgeText}</span></div>${tx.comment ? `<div class="tx-comment">📝 ${escapeHtml(tx.comment)}</div>` : ''}<div class="tx-comment">${tx.date}</div></div>
          <div class="tx-amount ${amountClass}">${sign} ${formatUAH(tx.amount)}</div>
          <button class="delete-btn" data-id="${tx.id}">✕</button>
        </div>`;
      }
      html += `</div>`;
    }
    container.innerHTML = html;
    document.querySelectorAll('#historyList .delete-btn').forEach(btn => {
      btn.addEventListener('click', () => { const id = btn.getAttribute('data-id'); showConfirm('Удалить эту операцию?', () => deleteTransaction(id)); });
    });
  }

  function renderCalendarModal(year, month) {
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const startOffset = firstDay === 0 ? 6 : firstDay - 1;
    let html = `<div class="calendar-header"><button id="calPrevBtn">◀</button><span>${new Date(year, month).toLocaleDateString('ru', { month:'long', year:'numeric' })}</span><button id="calNextBtn">▶</button></div>`;
    html += `<div class="calendar-weekdays">${['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(d => `<div>${d}</div>`).join('')}</div><div class="calendar-days">`;
    for (let i=0; i<startOffset; i++) html += `<div></div>`;
    for (let d=1; d<=daysInMonth; d++) {
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isSelected = dateStr === selectedDate;
      const isToday = dateStr === new Date().toISOString().slice(0,10);
      html += `<div class="cal-day ${isSelected ? 'selected' : ''} ${isToday ? 'today' : ''}" data-date="${dateStr}">${d}</div>`;
    }
    html += `</div>`;
    document.getElementById('calendarModalContent').innerHTML = html;
    
    document.querySelectorAll('#calendarModalContent .cal-day[data-date]').forEach(el => {
      el.addEventListener('click', () => {
        selectedDate = el.getAttribute('data-date');
        document.getElementById('selectedDateDisplay').innerText = selectedDate;
        document.getElementById('dateSelectModal').classList.remove('active');
      });
    });
    document.getElementById('calPrevBtn')?.addEventListener('click', () => {
      let nm = month-1, ny = year;
      if (nm < 0) { nm = 11; ny--; }
      currentCalendarYear = ny; currentCalendarMonth = nm;
      renderCalendarModal(ny, nm);
    });
    document.getElementById('calNextBtn')?.addEventListener('click', () => {
      let nm = month+1, ny = year;
      if (nm > 11) { nm = 0; ny++; }
      currentCalendarYear = ny; currentCalendarMonth = nm;
      renderCalendarModal(ny, nm);
    });
  }

  function renderCategorySelectList() {
    const container = document.getElementById('categorySelectList');
    container.innerHTML = '';
    categories.forEach(cat => {
      const div = document.createElement('div');
      div.className = 'category-option' + (selectedCategory === cat ? ' selected' : '');
      div.textContent = cat;
      div.addEventListener('click', () => {
        selectedCategory = cat;
        document.getElementById('selectedCategoryDisplay').innerText = cat;
        document.getElementById('categorySelectModal').classList.remove('active');
      });
      container.appendChild(div);
    });
  }

  function addTransaction() {
    let amount = parseFloat(document.getElementById('amountInput').value.trim());
    if (isNaN(amount) || amount <= 0) { showAlert('Введите сумму > 0'); return; }
    const active = document.querySelector('#typeToggle .type-btn.active-income, #typeToggle .type-btn.active-expense');
    const type = active?.getAttribute('data-type') === 'expense' ? 'expense' : 'income';
    const newId = Date.now() + Math.random();
    transactions.push({ id: newId, amount, type, category: selectedCategory, comment: document.getElementById('commentInput').value.trim(), date: selectedDate });
    document.getElementById('amountInput').value = '';
    document.getElementById('commentInput').value = '';
    selectedDate = new Date().toISOString().slice(0,10);
    document.getElementById('selectedDateDisplay').innerText = selectedDate;
    saveToLocal(); updateStats(); renderHistory();
    document.getElementById('operationModal').classList.remove('active');
    showAlert('Операция добавлена!', 'Готово');
  }

  function renderCatList() {
    const container = document.getElementById('categoryListContainer');
    container.innerHTML = '';
    categories.forEach((cat, idx) => {
      const div = document.createElement('div');
      div.className = 'cat-item';
      div.innerHTML = `<span class="cat-name">${escapeHtml(cat)}</span><div class="cat-actions"><button class="edit-cat" data-idx="${idx}">✏️</button><button class="del-cat" data-idx="${idx}">🗑</button></div>`;
      container.appendChild(div);
    });
    document.querySelectorAll('.edit-cat').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx);
        const old = categories[idx];
        showPrompt(old, (newName) => {
          if (newName && !categories.includes(newName)) {
            categories[idx] = newName;
            transactions.forEach(t => { if (t.category === old) t.category = newName; });
            if (selectedCategory === old) { selectedCategory = newName; document.getElementById('selectedCategoryDisplay').innerText = newName; }
            saveToLocal(); renderHistory(); renderCatList(); renderCategorySelectList();
          } else if (newName && categories.includes(newName)) showAlert('Категория существует');
        });
      });
    });
    document.querySelectorAll('.del-cat').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx);
        if (categories.length <= 1) { showAlert('Нельзя удалить последнюю категорию'); return; }
        const del = categories[idx];
        categories.splice(idx, 1);
        transactions.forEach(t => { if (t.category === del) t.category = 'Другое'; });
        if (!categories.includes('Другое')) categories.push('Другое');
        if (selectedCategory === del) { selectedCategory = 'Другое'; document.getElementById('selectedCategoryDisplay').innerText = 'Другое'; }
        saveToLocal(); renderHistory(); renderCatList(); renderCategorySelectList();
      });
    });
  }

  function openCategoryModal() { renderCatList(); document.getElementById('categoryModal').classList.add('active'); }
  function addNewCategory() {
    const val = document.getElementById('newCategoryName').value.trim();
    if (val && !categories.includes(val)) { categories.push(val); renderCatList(); renderCategorySelectList(); document.getElementById('newCategoryName').value = ''; saveToLocal(); showAlert(`Категория "${val}" добавлена`); }
    else if (!val) showAlert('Введите название');
    else showAlert('Такая категория уже есть');
  }

  function exportToExcel() {
    if (!transactions.length) { showAlert('Нет данных'); return; }
    const data = [['Дата', 'Тип', 'Категория', 'Сумма', 'Комментарий']];
    transactions.forEach(t => data.push([t.date, t.type === 'income' ? 'Доход' : 'Расход', t.category, t.amount, t.comment || '']));
    const ws = XLSX.utils.aoa_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Расходы');
    XLSX.writeFile(wb, `expenses_${new Date().toISOString().slice(0,19)}.xlsx`);
    showAlert('Excel скачан');
  }
  function exportBackup() {
    const blob = new Blob([JSON.stringify({ transactions, categories }, null, 2)], { type: 'application/json' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `backup_${new Date().toISOString().slice(0,19)}.json`; a.click();
    showAlert('Бэкап создан');
  }
  function importBackup(file) {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        if (data.transactions) transactions = data.transactions.map(t => ({ ...t, id: Date.now() + Math.random() }));
        if (data.categories) categories = data.categories;
        if (!categories.includes(selectedCategory)) selectedCategory = categories[0];
        document.getElementById('selectedCategoryDisplay').innerText = selectedCategory;
        saveToLocal(); updateStats(); renderHistory(); renderCategorySelectList();
        showAlert(`Восстановлено ${transactions.length} записей`);
      } catch { showAlert('Ошибка файла'); }
    };
    reader.readAsText(file);
  }
  function clearAll() { showConfirm('Удалить ВСЕ операции?', () => { transactions = []; saveToLocal(); updateStats(); renderHistory(); showAlert('Все удалено'); }); }
  function setFilter(f) { 
    currentFilter = f; 
    document.querySelectorAll('#historyModal .filter-btn').forEach(btn => btn.classList.remove('active-filter')); 
    document.querySelector(`#historyModal .filter-btn[data-filter="${f}"]`).classList.add('active-filter'); 
    renderHistory(); 
  }
  function updateFormBg() {
    const form = document.getElementById('operationForm');
    const active = document.querySelector('#typeToggle .type-btn.active-income, #typeToggle .type-btn.active-expense');
    form.classList.remove('income-bg', 'expense-bg');
    if (active?.dataset.type === 'income') form.classList.add('income-bg');
    else if (active?.dataset.type === 'expense') form.classList.add('expense-bg');
  }

  function init() {
    loadFromLocal();
    selectedCategory = categories[0];
    document.getElementById('selectedCategoryDisplay').innerText = selectedCategory;
    document.getElementById('selectedDateDisplay').innerText = selectedDate;
    updateStats(); renderHistory(); renderCategorySelectList();
    
    document.getElementById('openNewOperationBtn').onclick = () => document.getElementById('operationModal').classList.add('active');
    document.getElementById('openHistoryBtn').onclick = () => { renderHistory(); document.getElementById('historyModal').classList.add('active'); };
    document.getElementById('openSettingsBtn').onclick = () => document.getElementById('settingsDataModal').classList.add('active');
    
    document.getElementById('closeModalBtn').onclick = () => document.getElementById('operationModal').classList.remove('active');
    document.getElementById('closeHistoryBtn').onclick = () => document.getElementById('historyModal').classList.remove('active');
    document.getElementById('closeHistoryModalBtn').onclick = () => document.getElementById('historyModal').classList.remove('active');
    document.getElementById('closeSettingsBtn').onclick = () => document.getElementById('settingsDataModal').classList.remove('active');
    document.getElementById('closeSettingsModalBtn').onclick = () => document.getElementById('settingsDataModal').classList.remove('active');
    
    document.getElementById('openCategorySelectBtn').onclick = () => { renderCategorySelectList(); document.getElementById('categorySelectModal').classList.add('active'); };
    document.getElementById('closeCategorySelectBtn').onclick = () => document.getElementById('categorySelectModal').classList.remove('active');
    document.getElementById('openDateSelectBtn').onclick = () => { currentCalendarYear = new Date().getFullYear(); currentCalendarMonth = new Date().getMonth(); renderCalendarModal(currentCalendarYear, currentCalendarMonth); document.getElementById('dateSelectModal').classList.add('active'); };
    document.getElementById('closeDateSelectBtn').onclick = () => document.getElementById('dateSelectModal').classList.remove('active');
    document.getElementById('addTransactionBtn').onclick = addTransaction;
    document.getElementById('exportExcelBtn').onclick = exportToExcel;
    document.getElementById('exportBackupBtn').onclick = exportBackup;
    document.getElementById('softClearBtn').onclick = clearAll;
    document.getElementById('editCategoriesFromSettingsBtn').onclick = () => { document.getElementById('settingsDataModal').classList.remove('active'); openCategoryModal(); };
    document.getElementById('importFileInput').onchange = e => { if (e.target.files[0]) importBackup(e.target.files[0]); e.target.value = ''; };
    document.getElementById('closeCatModalBtn').onclick = () => document.getElementById('categoryModal').classList.remove('active');
    document.getElementById('addCategoryBtn').onclick = addNewCategory;
    
    document.querySelectorAll('#historyModal .filter-btn').forEach(btn => btn.onclick = () => setFilter(btn.dataset.filter));
    
    document.querySelectorAll('#typeToggle .type-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#typeToggle .type-btn').forEach(b => b.classList.remove('active-income', 'active-expense'));
        btn.classList.add(btn.dataset.type === 'income' ? 'active-income' : 'active-expense');
        updateFormBg();
      });
    });
    updateFormBg();
    
    document.getElementById('operationModal').addEventListener('click', (e) => { if (e.target === document.getElementById('operationModal')) document.getElementById('operationModal').classList.remove('active'); });
    document.getElementById('historyModal').addEventListener('click', (e) => { if (e.target === document.getElementById('historyModal')) document.getElementById('historyModal').classList.remove('active'); });
    document.getElementById('settingsDataModal').addEventListener('click', (e) => { if (e.target === document.getElementById('settingsDataModal')) document.getElementById('settingsDataModal').classList.remove('active'); });
    document.getElementById('categorySelectModal').addEventListener('click', (e) => { if (e.target === document.getElementById('categorySelectModal')) document.getElementById('categorySelectModal').classList.remove('active'); });
    document.getElementById('dateSelectModal').addEventListener('click', (e) => { if (e.target === document.getElementById('dateSelectModal')) document.getElementById('dateSelectModal').classList.remove('active'); });
  }
  init();
</script>
</body>
</html>
